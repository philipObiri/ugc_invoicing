{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
    /* Resetting Django's default 'heavy' blues to match a modern look */
    :root { --primary-color: #570df8; }
    
    #header { 
        @apply bg-slate-900 border-b border-slate-700 !important; 
        background: #0f172a !important; 
    }
    
    #content-main { @apply p-6 bg-base-200 rounded-xl shadow-inner; }
    
    /* Transforming Django Buttons into DaisyUI Buttons */
    .submit-row input, .button, .addlink {
        @apply btn btn-primary btn-sm rounded-lg border-none !important;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    
    .deletelink { @apply btn btn-error btn-sm !important; }

    /* Modernizing the Data Table */
    #changelist-form table thead th {
        @apply bg-slate-100 text-slate-600 font-bold uppercase text-xs !important;
    }
</style>
{% endblock %}

{% block branding %}
<div class="flex items-center gap-3 py-4">
    <div class="p-2 bg-primary rounded-lg text-primary-content shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </div>
    <div class="flex flex-col">
        <h1 class="text-xl font-black text-white leading-none tracking-tight">
            FINANCE & INVOICE <span class="text-primary font-light">MANAGEMENT</span>
        </h1>
        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">UGC Admin Portal</span>
    </div>
</div>
{% endblock %}

{% block nav-global %}
<div class="flex gap-4 px-4">
    <div class="badge badge-outline badge-sm text-slate-400 border-slate-700">Server Time: {% now "H:i" %}</div>
    <div class="badge badge-primary badge-sm">Live System</div>
</div>
{% endblock %}
